<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Geo-Quiz 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto:wght@500&display=swap" rel="stylesheet">
    <style>
        .google-btn {
            background-color: #ffffff;
            color: #3c4043;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            border: 1px solid #dadce0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 8px;
            transition: background-color 0.3s, box-shadow 0.3s;
            text-decoration: none;
            width: 100%;
            margin-top: 20px;
            box-sizing: border-box;
        }
        .google-btn:hover {
            background-color: #f8f9fa;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .header-box {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .logo-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(to top right, #3b82f6, #34d399);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logo-box:hover {
            transform: scale(1.05);
        }
        .logo-box span {
            font-size: 30px;
            user-select: none;
        }
        .header-title {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: white;
            margin: 0;
            text-transform: uppercase;
        }
        .header-title span {
            font-weight: 300;
            color: #60a5fa;
        }
        .links {
            margin-top: 24px;
            text-align: center;
        }
        .links a {
            font-size: 14px;
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container" style="font-family: 'Outfit', sans-serif;">
        <!-- Cabeçalho idêntico ao in_game -->
        <div class="header-box">
            <div class="logo-box">
                <span class="animate-spin-slow">🌍</span>
            </div>
            <h1 class="header-title glow-text">GEOQUIZ <span>3D</span></h1>
        </div>

        <div th:if="${param.error}" style="color: #ff6b6b; text-align: center; margin-bottom: 15px; font-size: 14px;">
            E-mail ou senha inválidos.
        </div>
        <div th:if="${param.logout}" style="color: #1dd1a1; text-align: center; margin-bottom: 15px; font-size: 14px;">
            Logout realizado com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <input type="text" name="username" required>
                <label>E-mail</label>
            </div>
            <div class="input-group">
                <input type="password" name="password" required>
                <label>Senha</label>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Entrar</button>
        </form>

        <a th:href="@{/oauth2/authorization/google}" class="google-btn">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="18px" height="18px" viewBox="0 0 48 48" class="mr-3">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
            Entrar com o Google
        </a>

        <div class="links">
            <a th:href="@{/register}">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
