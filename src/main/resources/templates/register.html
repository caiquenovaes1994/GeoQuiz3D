<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Geo-Quiz 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto:wght@500&display=swap" rel="stylesheet">
    <style>
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .header-box {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .logo-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(to top right, #3b82f6, #34d399);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logo-box:hover {
            transform: scale(1.05);
        }
        .logo-box span {
            font-size: 30px;
            user-select: none;
        }
        .header-title {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: white;
            margin: 0;
            text-transform: uppercase;
        }
        .header-title span {
            font-weight: 300;
            color: #60a5fa;
        }
        .links {
            margin-top: 24px;
            text-align: center;
        }
        .links a {
            font-size: 14px;
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #ffffff;
        }
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
        }
        .password-requirements {
            font-size: 11px;
            color: #9ca3af;
            margin-top: -10px;
            margin-bottom: 15px;
            text-align: left;
            padding-left: 5px;
        }
        .password-requirements ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="container" style="font-family: 'Outfit', sans-serif;">
        <div class="header-box">
            <div class="logo-box">
                <span class="animate-spin-slow">🌍</span>
            </div>
            <h1 class="header-title glow-text">GEOQUIZ <span>3D</span></h1>
        </div>
        
        <h2 style="text-align: center; color: white; margin-bottom: 20px; font-size: 20px; font-weight: 600;">Criar Conta</h2>

        <div th:if="${error}" class="error-msg" th:text="${error}">
            Erro ao criar conta.
        </div>

        <form th:action="@{/register}" method="post" id="registerForm">
            <div class="input-group">
                <input type="email" name="email" required th:value="${email}">
                <label>E-mail</label>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="password" required>
                <label>Senha</label>
            </div>
            
            <div class="password-requirements">
                A senha deve conter:
                <ul>
                    <li>Mínimo de 8 caracteres</li>
                    <li>Ao menos 1 letra maiúscula</li>
                    <li>Ao menos 1 número</li>
                    <li>Ao menos 1 caractere especial</li>
                </ul>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Criar Conta</button>
        </form>

        <div class="links">
            <a th:href="@{/login}">Já tem uma conta? Faça Login</a>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pwd = document.getElementById('password').value;
            const regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
            if (!regex.test(pwd)) {
                e.preventDefault();
                alert('A senha não atende aos requisitos mínimos!');
            }
        });
    </script>
</body>
</html>
